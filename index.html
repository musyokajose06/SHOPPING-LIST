<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Shopping list</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- Shopping List -->
        <h1>SHOPPING LIST</h1>
        <!-- Input Fields -->
        <div class="container">
            <input type="text" id="item-input" placeholder="Add an item...">
            <input type="number" id="quantity-input" placeholder="Quantity" min="1">
            <input type="number" id="price-input" placeholder="Price" min="0" step="0.01">
            <button id="add-button">Add</button>
            <button id="clear-button">Clear List</button>
        </div>
        <!-- Shopping List -->
        <div class="list">
            <ul id="shopping-list"></ul>
        </div>
        <!-- Summary total -->
        <div class="summary">
            <p id="purchased-total">Purchased total: $0.00</p>
        </div>
        <script src="main.js"></script>
    </body>
</html>
